# ────────────────────────────────
# SELECT
# ────────────────────────────────
select:
  - platform: template
    name: Completion Tune
    id: tune_select
    optimistic: true
    options:
      - "Adams Family"
      - "Batman"
      - "Bev Cop"
      - "Final Countdown"
      - "Flintstones"
      - "Funky Town"
      - "Halloween"
      - "Happy Birthday"
      - "Indiana Jones"
      - "Jeopardy"
      - "Knight Rider"
      - "Looney Tunes"
      - "Mission Imp"
      - "Pacman"
      - "Pink Panther"
      - "Popeye"
      - "The Simpsons"
      - "Smoke on the Water"
      - "Star Wars"
      - "Super Man"
      - "The A Team"
      - "Double Beep"
    initial_option: "Star Wars"
    set_action:
      lambda: |-
        auto &names = id(tune_names);
        for (int i = 0; i < (int)names.size(); i++) {
          if (x == names[i]) {
            id(current_tune_index) = i;
            break;
          }
        }
        id(tune_select).publish_state(x);
    web_server:
      sorting_group_id: main
      sorting_weight: 2

# ────────────────────────────────
# BUTTONS
# ────────────────────────────────
button:
  - platform: template
    name: Dispense Now
    id: dispense_btn
    on_press:
      - script.execute: dispense
    web_server:
      sorting_group_id: main
      sorting_weight: 3

  - platform: restart
    name: "${friendly_name} Restart"
    web_server:
      sorting_group_id: telemetry
      sorting_weight: 9

# ────────────────────────────────
# SCRIPTS
# ────────────────────────────────
script:
  - id: beep_short
    then:
      - rtttl.play: "beep:d=4,o=5,b=100:16c6"

  - id: error_blink_red
    mode: restart
    then:
      - repeat:
          count: 8
          then:
            - switch.toggle: led_red
            - delay: 200ms
      - switch.turn_off: led_red

  - id: play_tune
    parameters:
      tune_idx: int
    then:
      - lambda: |-
          // 0: Adams Family
          if (tune_idx == 0) {
            id(rtttl_player).play("AdamsFamily:d=8,o=5,b=160:c,4f,a,4f,c,4b4,2g,f,4e,g,4e,g4,4c,2f,c,4f,a,4f,c,4b4,2g,f,4e,c,4d,e,1f,c,d,e,f,1p,d,e,f#,g,1p,d,e,f#,g,4p,d,e,f#,g,4p,c,d,e,f");
          } else if (tune_idx == 1) {
            id(rtttl_player).play("Batman:d=8,o=5,b=180:d,d,c#,c#,c,c,c#,c#,d,d,c#,c#,c,c,c#,c#,d,d#,c,c#,c,c,c#,c#,f,p,4f");
          } else if (tune_idx == 2) {
            id(rtttl_player).play("BevCop:d=8,o=5,b=125:16g,16g,a#.,16g,16p,16g,c6,g,f,4g,d6.,16g,16p,16g,d#6,d6,a#,g,d6,g6,16g,16f,16p,16f,d,a#,2g,4p,16f6,d6,c6,a#,4g,a#.,16g,16p,16g,c6,g,f,4g,d6.,16g,16p,16g,d#6,d6,a#,g,d6,g6,16g,16f,16p,16f,d,a#,2g");
          } else if (tune_idx == 3) {
