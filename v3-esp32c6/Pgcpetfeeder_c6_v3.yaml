    web_server:
      sorting_group_id: slot2
      sorting_weight: 4

  # ── Slot 3 ──
  - platform: template
    name: "Slot 3 Hour"
    min_value: 0
    max_value: 23
    step: 1
    mode: box
    lambda: return id(slot3_h);
    set_action:
      - lambda: id(slot3_h) = (int)x;
    web_server:
      sorting_group_id: slot3
      sorting_weight: 2

  - platform: template
    name: "Slot 3 Minute"
    min_value: 0
    max_value: 59
    step: 1
    mode: box
    lambda: return id(slot3_m);
    set_action:
      - lambda: id(slot3_m) = (int)x;
    web_server:
      sorting_group_id: slot3
      sorting_weight: 3

