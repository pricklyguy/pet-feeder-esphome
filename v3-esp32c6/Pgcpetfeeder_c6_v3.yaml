  - id: dispense
    mode: restart
    then:
      - script.execute: beep_short
      - lambda: id(feed_start) = id(lifetime_portions_int);
      - switch.turn_on: led_red
      - switch.turn_off: led_green
      - switch.turn_on: motor
      - wait_until:
          condition:
            lambda: |-
              int now_total = id(lifetime_portions_int);
              return (now_total - id(feed_start)) >= id(current_portions);
          timeout: 16s
      - switch.turn_off: motor
      - switch.turn_off: led_red
      - switch.turn_on: led_green
      - if:
          condition:
            lambda: |-
              int moved = id(lifetime_portions_int) - id(feed_start);
              return moved >= id(current_portions);
          then:
            - lambda: |-
                int moved = id(lifetime_portions_int) - id(feed_start);
                id(portions_today) += moved;
                id(lifetime_portions).publish_state(id(lifetime_portions_int));
            - script.execute:
                id: play_tune
                tune_idx: !lambda 'return id(current_tune_index);'
          else:
            - script.execute: error_blink_red
            - script.execute:
                id: play_tune
                tune_idx: 21  # Double Beep error tone

# ────────────────────────────────
# INTERVALS
# ────────────────────────────────
interval:
  - interval: 10s
    then:
      - lambda: |-
          auto t = id(device_time).now();
          if (!t.is_valid()) return;
          if (t.hour == 0 && t.minute == 0 && t.second < 10) {
            id(portions_today) = 0;
            id(slot1_ran) = false;
            id(slot2_ran) = false;
            id(slot3_ran) = false;
            id(slot4_ran) = false;
          }
      - lambda: |-
          auto t = id(device_time).now();
          if (!t.is_valid()) return;
          auto run_slot = [&](bool en, int h, int m, int p, bool &ran_flag, int slot_num) {
            if (!en) return;
            if (ran_flag) return;
            if (t.hour != h || t.minute != m) return;
            int portions = p;
            if (portions < 1) portions = 1;
            if (portions > 10) portions = 10;
            id(current_portions) = portions;
            id(portions_number).publish_state(portions);
            ESP_LOGI("schedule", "Running slot %d at %02d:%02d for %d portions",
                     slot_num, h, m, portions);
            ran_flag = true;
            id(dispense).execute();
          };
          run_slot(id(slot1_en), id(slot1_h), id(slot1_m), id(slot1_p), id(slot1_ran), 1);
          run_slot(id(slot2_en), id(slot2_h), id(slot2_m), id(slot2_p), id(slot2_ran), 2);
          run_slot(id(slot3_en), id(slot3_h), id(slot3_m), id(slot3_p), id(slot3_ran), 3);
          run_slot(id(slot4_en), id(slot4_h), id(slot4_m), id(slot4_p), id(slot4_ran), 4);
