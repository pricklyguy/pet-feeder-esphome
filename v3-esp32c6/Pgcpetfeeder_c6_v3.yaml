substitutions:
  device_name: twixfeeder
  friendly_name: Twix Feeder

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  comment: "Feeder w/ display and button control"
  on_boot:
    - priority: -200
      then:
        - lambda: |-
            id(boot_count) += 1;
            ESP_LOGW("boot", "BOOT COUNT=%d", id(boot_count));
    - priority: -10
      then:
        - delay: 2s
        - lambda: |-
            id(portions_number).publish_state(id(current_portions));
            id(tune_select).publish_state(id(tune_names)[id(current_tune_index)]);
            id(lifetime_portions).publish_state(id(lifetime_portions_int));

esp32:
  board: seeed_xiao_esp32c6
  framework:
    type: esp-idf

logger:
  level: INFO

preferences:
  flash_write_interval: 10s

api:
 

  reboot_timeout: 0s

ota:
  - platform: esphome


web_server:
  port: 80
  version: 3
  css_url: "https://pricklyguy.github.io/pgc-esphome-ui/prickly_overrides.css?v=1.0.4"
  js_url:  "https://pricklyguy.github.io/pgc-esphome-ui/prickly_loader.js?v=1.0.4"
  sorting_groups:
    - id: main
      name: "Setup and Control"
      sorting_weight: 10
    - id: slot1
      name: "Schedule Slot 1"
      sorting_weight: 20
    - id: slot2
      name: "Schedule Slot 2"
      sorting_weight: 21
    - id: slot3
      name: "Schedule Slot 3"
      sorting_weight: 22
    - id: slot4
      name: "Schedule Slot 4"
      sorting_weight: 23
    - id: telemetry
      name: "Status / Sensors"
      sorting_weight: 30

wifi:
  networks:
    - ssid: !secret wifi_ssid
      password: !secret wifi_password
      manual_ip:
        static_ip: 10.10.1.233
        gateway: 10.10.1.1
        subnet: 255.255.255.0
        dns1: 10.10.1.1        
    - ssid: !secret hotspot_ssid
      password: !secret hotspot_password
  ap:
    ssid: "${device_name}-fallback"
    password: !secret ap_password
  power_save_mode: none
  fast_connect: true
  reboot_timeout: 0s

captive_portal:

time:
  - platform: sntp
    id: device_time
    timezone: "America/Phoenix"
    servers:
      - 0.pool.ntp.org
      - 1.pool.ntp.org

# ────────────────────────────────
# I2C / OLED
# ────────────────────────────────
i2c:
  sda: D4
  scl: D5

font:
  - file: "gfonts://Roboto"
    id: f1
    size: 18
  - file: "gfonts://Roboto"
    id: f2
    size: 14

display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x32"
    address: 0x3C
    lambda: |-
      bool edit_tune = id(edit_mode);
      it.printf(0,0,id(f1),"%sPortions: %d",
        edit_tune ? " " : ">",
        id(current_portions));
      it.printf(0,18,id(f2),"%s%s",
        edit_tune ? ">" : " ",
        id(tune_names)[id(current_tune_index)].c_str());

# ────────────────────────────────
# OUTPUTS
# ────────────────────────────────
output:
  - platform: ledc
    id: motor_pwm
    pin: D0
    frequency: 1000Hz
  - platform: ledc
    id: buzzer
    pin: D2

# ────────────────────────────────
# SWITCHES
# ────────────────────────────────
switch:
  - platform: output
    id: motor
    output: motor_pwm
    internal: true

  - platform: gpio
    id: led_green
    pin: D3
    restore_mode: ALWAYS_ON

  - platform: gpio
    id: led_red
    pin: D10
    restore_mode: ALWAYS_OFF

  - platform: template
    id: slot1_en_switch
    name: "Schedule Slot 1 Enabled"
    restore_mode: RESTORE_DEFAULT_ON
    optimistic: true
    lambda: return id(slot1_en);
    turn_on_action:
      - lambda: id(slot1_en) = true;
    turn_off_action:
      - lambda: id(slot1_en) = false;
    web_server:
      sorting_group_id: slot1
      sorting_weight: 1

  - platform: template
    id: slot2_en_switch
    name: "Schedule Slot 2 Enabled"
    restore_mode: RESTORE_DEFAULT_ON
    optimistic: true
    lambda: return id(slot2_en);
    turn_on_action:
      - lambda: id(slot2_en) = true;
    turn_off_action:
      - lambda: id(slot2_en) = false;
    web_server:
      sorting_group_id: slot2
      sorting_weight: 1

  - platform: template
    id: slot3_en_switch
    name: "Schedule Slot 3 Enabled"
    restore_mode: RESTORE_DEFAULT_ON
    optimistic: true
    lambda: return id(slot3_en);
    turn_on_action:
      - lambda: id(slot3_en) = true;
    turn_off_action:
      - lambda: id(slot3_en) = false;
    web_server:
      sorting_group_id: slot3
      sorting_weight: 1

  - platform: template
    id: slot4_en_switch
    name: "Schedule Slot 4 Enabled"
    restore_mode: RESTORE_DEFAULT_ON
    optimistic: true
    lambda: return id(slot4_en);
    turn_on_action:
      - lambda: id(slot4_en) = true;
    turn_off_action:
      - lambda: id(slot4_en) = false;
    web_server:
      sorting_group_id: slot4
      sorting_weight: 1

# ────────────────────────────────
# BUZZER / RTTTL
# ────────────────────────────────
rtttl:
  output: buzzer
  id: rtttl_player
  on_finished_playback:
    then:
      - output.turn_off: buzzer

# ────────────────────────────────
# TEXT SENSORS
# ────────────────────────────────
text_sensor:
  - platform: wifi_info
    ip_address:
      name: "${friendly_name} IP Address"
      web_server:
        sorting_group_id: telemetry
        sorting_weight: 1
    mac_address:
      name: "${friendly_name} MAC Address"
      web_server:
        sorting_group_id: telemetry
        sorting_weight: 2

  - platform: template
    name: "Device Time"
    lambda: |-
      auto t = id(device_time).now();
      if (!t.is_valid()) return {"--:--:--"};
      char buf[16];
      snprintf(buf, sizeof(buf), "%02d:%02d:%02d", t.hour, t.minute, t.second);
      return {buf};
    update_interval: 30s
    internal: true
    web_server:
      sorting_group_id: telemetry
      sorting_weight: 3

# ────────────────────────────────
# SENSORS
# ────────────────────────────────
sensor:
  - platform: template
    name: "Boot Count"
    accuracy_decimals: 0
    update_interval: 60s
    lambda: return (float) id(boot_count);
    web_server:
      sorting_group_id: telemetry
      sorting_weight: 4.9

  - platform: template
    id: lifetime_portions
    name: "Total Portions Dispensed"
    unit_of_measurement: "portions"
    accuracy_decimals: 0
    update_interval: never
    lambda: return (float) id(lifetime_portions_int);
    web_server:
      sorting_group_id: telemetry
      sorting_weight: 5

  - platform: uptime
    name: "${friendly_name} Uptime"
    web_server:
      sorting_group_id: telemetry
      sorting_weight: 6

  - platform: wifi_signal
    name: "${friendly_name} WiFi Signal"
    update_interval: 60s
    web_server:
      sorting_group_id: telemetry
      sorting_weight: 7

  - platform: template
    name: "Portions Today"
    lambda: return id(portions_today);
    web_server:
      sorting_group_id: main
      sorting_weight: 4

# ────────────────────────────────
# BINARY SENSORS
# ────────────────────────────────
binary_sensor:
  - platform: gpio
    id: btn_lock
    pin:
      number: D6
      mode: INPUT_PULLUP
      inverted: true
    filters:
      - delayed_on: 50ms
    internal: true
    on_press:
      then:
        - lambda: id(edit_mode) = !id(edit_mode);
        - script.execute: beep_short

  - platform: gpio
    id: btn_up
    pin:
      number: D7
      mode: INPUT_PULLUP
      inverted: true
    filters:
      - delayed_on: 50ms
    internal: true
    on_press:
      then:
        - lambda: |-
            if (!id(edit_mode)) {
              if (id(current_portions) < 10) id(current_portions)++;
              id(portions_number).publish_state(id(current_portions));
            } else {
              id(current_tune_index) = (id(current_tune_index) + 1) % 22;
              id(tune_select).publish_state(id(tune_names)[id(current_tune_index)]);
            }

  - platform: gpio
    id: btn_down
    pin:
      number: D8
      mode: INPUT_PULLUP
      inverted: true
    filters:
      - delayed_on: 50ms
    internal: true
    on_press:
      then:
        - lambda: |-
            if (!id(edit_mode)) {
              if (id(current_portions) > 1) id(current_portions)--;
              id(portions_number).publish_state(id(current_portions));
            } else {
              id(current_tune_index) = (id(current_tune_index) + 21) % 22;
              id(tune_select).publish_state(id(tune_names)[id(current_tune_index)]);
            }

  - platform: gpio
    id: btn_set
    pin:
      number: D9
      mode: INPUT_PULLUP
      inverted: true
    filters:
      - delayed_on: 50ms
    internal: true
    on_press:
      then:
        - script.execute: dispense

  # Low food sensor — not present on this hardware revision, re-enable when equipped
  # - platform: gpio
  #   id: "low_food"
  #   name: Low Food
  #   pin:
  #     number: GPIO6
  #     mode: INPUT_PULLUP
  #     inverted: false
  #   device_class: problem
  #   filters:
  #     - delayed_on: 3s
  #     - delayed_off: 10s
  #   web_server:
  #     sorting_group_id: main
  #     sorting_weight: 5

  - platform: status
    name: "${friendly_name} Status"
    id: ${device_name}_status
    web_server:
      sorting_group_id: telemetry
      sorting_weight: 8

  - platform: gpio
    id: feed_microswitch
    internal: true
    pin:
      number: D1
      mode: INPUT_PULLUP
      inverted: true
    filters:
      - delayed_on: 30ms
      - delayed_off: 30ms
    on_press:
      then:
        - lambda: |-
            const uint32_t now = millis();
            if (now - id(last_pulse_ms) < id(pulse_lockout_ms)) return;
            id(last_pulse_ms) = now;
            id(lifetime_portions_int) += 1;
            id(lifetime_portions).publish_state(id(lifetime_portions_int));

# ────────────────────────────────
# GLOBALS
# ────────────────────────────────
globals:
  - id: boot_count
    type: int
    restore_value: yes
    initial_value: '0'
  - id: current_portions
    type: int
    restore_value: yes
    initial_value: '3'
  - id: current_tune_index
    type: int
    restore_value: yes
    initial_value: '18'
  - id: edit_mode
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: portions_today
    type: int
    restore_value: yes
    initial_value: '0'
  - id: feed_start
    type: int
    restore_value: no
    initial_value: '0'
  - id: tune_names
    type: std::vector<std::string>
    # Index reference:
    #  0  Adams Family     6  Halloween       12  Mission Imp      18  Star Wars
    #  1  Batman           7  Happy Birthday  13  Pacman           19  Super Man
    #  2  Bev Cop          8  Indiana Jones   14  Pink Panther     20  The A Team
    #  3  Final Countdown  9  Jeopardy        15  Popeye           21  Double Beep (error)
    #  4  Flintstones     10  Knight Rider    16  The Simpsons
    #  5  Funky Town      11  Looney Tunes    17  Smoke on the Water
    initial_value: '{"Adams Family","Batman","Bev Cop","Final Countdown","Flintstones","Funky Town","Halloween","Happy Birthday","Indiana Jones","Jeopardy","Knight Rider","Looney Tunes","Mission Imp","Pacman","Pink Panther","Popeye","The Simpsons","Smoke on the Water","Star Wars","Super Man","The A Team","Double Beep"}'

  - id: slot1_en
    type: bool
    restore_value: yes
    initial_value: 'true'
  - id: slot2_en
    type: bool
    restore_value: yes
    initial_value: 'true'
  - id: slot3_en
    type: bool
    restore_value: yes
    initial_value: 'true'
  - id: slot4_en
    type: bool
    restore_value: yes
    initial_value: 'true'

  - id: slot1_h
    type: int
    restore_value: yes
    initial_value: '7'
  - id: slot1_m
    type: int
    restore_value: yes
    initial_value: '0'
  - id: slot1_p
    type: int
    restore_value: yes
    initial_value: '3'

  - id: slot2_h
    type: int
    restore_value: yes
    initial_value: '12'
  - id: slot2_m
    type: int
    restore_value: yes
    initial_value: '0'
  - id: slot2_p
    type: int
    restore_value: yes
    initial_value: '3'

  - id: slot3_h
    type: int
    restore_value: yes
    initial_value: '17'
  - id: slot3_m
    type: int
    restore_value: yes
    initial_value: '0'
  - id: slot3_p
    type: int
    restore_value: yes
    initial_value: '3'

  - id: slot4_h
    type: int
    restore_value: yes
    initial_value: '21'
  - id: slot4_m
    type: int
    restore_value: yes
    initial_value: '0'
  - id: slot4_p
    type: int
    restore_value: yes
    initial_value: '2'

  - id: slot1_ran
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: slot2_ran
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: slot3_ran
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: slot4_ran
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: lifetime_portions_int
    type: int
    restore_value: yes
    initial_value: '0'

  - id: last_pulse_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'

  - id: pulse_lockout_ms
    type: uint32_t
    restore_value: yes
    initial_value: '800'

# ────────────────────────────────
# NUMBERS
# ────────────────────────────────
number:
  - platform: template
    name: "Portions"
    id: portions_number
    min_value: 1
    max_value: 10
    step: 1
    mode: box
    lambda: return id(current_portions);
    set_action:
      - lambda: |-
          int v = (int) x;
          if (v < 1) v = 1;
          if (v > 10) v = 10;
          id(current_portions) = v;
          id(portions_number).publish_state(v);
    web_server:
      sorting_group_id: main
      sorting_weight: 1

  # ── Slot 1 ──
  - platform: template
    name: "Slot 1 Hour"
    min_value: 0
    max_value: 23
    step: 1
    mode: box
    lambda: return id(slot1_h);
    set_action:
      - lambda: id(slot1_h) = (int)x;
    web_server:
      sorting_group_id: slot1
      sorting_weight: 2

  - platform: template
    name: "Slot 1 Minute"
    min_value: 0
    max_value: 59
    step: 1
    mode: box
    lambda: return id(slot1_m);
    set_action:
      - lambda: id(slot1_m) = (int)x;
    web_server:
      sorting_group_id: slot1
      sorting_weight: 3

  - platform: template
    name: "Slot 1 Portions"
    min_value: 1
    max_value: 10
    step: 1
    mode: box
    lambda: return id(slot1_p);
    set_action:
      - lambda: |-
          int v = (int)x;
          if (v < 1) v = 1;
          if (v > 10) v = 10;
          id(slot1_p) = v;
    web_server:
      sorting_group_id: slot1
      sorting_weight: 4

